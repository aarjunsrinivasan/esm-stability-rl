# Megascale ΔG ridge-probe, ESMC-6B — see fit_probe_300M.yaml for the full
# explanation of this 3-size comparison and the split-file prerequisite.
# dtype: bf16 is required — ESMC-6B in its default fp32 dtype alone occupies
# ~23GB and OOMs a 24GB GPU before any activations are computed.
# Run:  pixi run python reward/fit_probe.py --config reward/configs/fit_probe_6B.yaml

model: biohub/ESMC-6B
dtype: bf16
layer: -2
split_file: data/prepared/wt_split_foldseek.csv
n_train: 0
n_eval: 0
batch_size: 32            # forward-only; benchmark/results/report_20260720_143854.md shows
                          # 6B forward handles batch 128 at seq_len 512 in 17.9GB (bf16)
seed: 0
