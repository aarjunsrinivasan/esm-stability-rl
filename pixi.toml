[workspace]
name = "esm-stability-rl"
description = "RL alignment of ESM-C on protein folding stability (DPO vs GRPO)"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64"]

# Base tools come from conda-forge; the ML stack comes from PyPI so we get the
# CUDA torch wheel on linux-64 and the MPS wheel on osx-arm64 automatically.
[dependencies]
python = "3.12.*"
pip = "*"
foldseek = "*"                 # structural clustering for the ESM3-style stability split (data/foldseek_split.py)

[pypi-dependencies]
torch = ">=2.6,<3"             # SDPA FlashAttention-2 backend on Ampere+ (bf16/fp16)
transformers = { git = "https://github.com/Biohub/transformers.git", rev = "main" }  # ESM-C support isn't in stock PyPI transformers yet
accelerate = ">=1.13,<2"      # device placement / dtype="auto"
peft = ">=0.19"                # LoRA adapters for the DPO/GRPO policy
scikit-learn = "*"             # RidgeCV probe
scipy = "*"                    # spearmanr / pearsonr
numpy = ">=1.26,<2.0"
pandas = "*"
tqdm = "*"
matplotlib = "*"
requests = "*"                 # download_tsuboyama.py
ipykernel = "*"                # notebooks/
ipywidgets = "*"               # interactive widgets in notebooks
jupyterlab = "*"               # notebook UI

# No [tasks] — run scripts explicitly with `pixi run python <script>` (see README).
